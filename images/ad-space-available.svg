<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 120" width="728" height="120">
  <defs>
    <linearGradient id="adBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b4332"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="adAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e07a5f"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="728" height="120" rx="12" fill="url(#adBg)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="20" r="60" fill="rgba(255,255,255,0.03)"/>
  <circle cx="700" cy="100" r="45" fill="rgba(255,255,255,0.02)"/>
  <!-- Accent line -->
  <rect x="0" y="0" width="6" height="120" rx="3" fill="url(#adAccent)"/>
  <!-- Paw prints decoration -->
  <text x="660" y="45" font-size="22" fill="rgba(255,255,255,0.1)">🐾</text>
  <text x="690" y="70" font-size="16" fill="rgba(255,255,255,0.08)">🐾</text>
  <!-- Main text -->
  <text x="50" y="45" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#ffffff">Ad Space Available</text>
  <text x="50" y="70" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">Reach thousands of pet lovers every month. Premium placement available.</text>
  <!-- Email button -->
  <rect x="50" y="85" width="200" height="26" rx="13" fill="#e07a5f" opacity="0.9"/>
  <text x="150" y="102" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">✉️ sundahong1990@gmail.com</text>
  <!-- Tag -->
  <rect x="580" y="10" width="95" height="22" rx="11" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="627" y="25" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="1.5">SPONSORED</text>
  <text x="700" y="102" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">Paws &amp; Whiskers</text>
</svg>
